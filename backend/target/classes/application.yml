server:
  port: 8080

spring:
  application:
    name: lost-found-backend
  datasource:
    url: jdbc:h2:file:./data/lostfound_v2;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: always
